<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PulseForge • Live Crypto</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">

  <div class="max-w-7xl mx-auto p-6">
    <h1 class="text-4xl font-bold mb-8">PulseForge</h1>

    <div id="loading" class="text-center py-10">
      <i class="fas fa-spinner fa-spin text-4xl text-emerald-400"></i>
      <p class="mt-4 text-gray-400">Loading live market data...</p>
    </div>

    <div id="error" class="hidden text-center py-10 text-red-400">
      <p>Failed to load data. Please refresh.</p>
    </div>

    <div id="main-content" class="hidden">
      <!-- Table will appear here -->
    </div>
  </div>

  <script>
    async function loadData() {
      try {
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('error').classList.add('hidden');
        document.getElementById('main-content').classList.add('hidden');

        const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=30&page=1');
        
        if (!res.ok) throw new Error("API error");

        const coins = await res.json();

        let html = `
          <table class="w-full bg-gray-900 rounded-3xl overflow-hidden">
            <thead>
              <tr class="border-b border-gray-700 text-gray-400">
                <th class="text-left py-5 px-6">#</th>
                <th class="text-left py-5 px-6">Coin</th>
                <th class="text-right py-5 px-6">Price</th>
                <th class="text-right py-5 px-6">24h</th>
              </tr>
            </thead>
            <tbody class="text-base">
        `;

        coins.forEach((coin, i) => {
          const change = coin.price_change_percentage_24h || 0;
          const color = change >= 0 ? 'text-emerald-400' : 'text-red-400';
          html += `
            <tr class="border-b border-gray-700 hover:bg-gray-800">
              <td class="py-5 px-6">${i+1}</td>
              <td class="py-5 px-6 flex items-center gap-3">
                <img src="${coin.image}" class="w-8 h-8 rounded-full">
                <div>${coin.name} <span class="text-gray-400">(${coin.symbol.toUpperCase()})</span></div>
              </td>
              <td class="py-5 px-6 text-right">$${coin.current_price.toLocaleString()}</td>
              <td class="py-5 px-6 text-right ${color}">${change.toFixed(2)}%</td>
            </tr>`;
        });

        html += `</tbody></table>`;
        document.getElementById('main-content').innerHTML = html;
        document.getElementById('main-content').classList.remove('hidden');

      } catch (e) {
        console.error(e);
        document.getElementById('error').classList.remove('hidden');
      } finally {
        document.getElementById('loading').classList.add('hidden');
      }
    }

    loadData();
    setInterval(loadData, 60000); // Refresh every 60 seconds
  </script>
</body>
</html>
